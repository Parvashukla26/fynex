<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Logo Circle -->
  <circle cx="600" cy="260" r="80" fill="none" stroke="#D4AF37" stroke-width="3" opacity="0.4"/>
  <circle cx="600" cy="260" r="18" fill="#D4AF37"/>
  
  <!-- Brand Name -->
  <text x="600" y="420" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="72" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    Fyn<tspan fill="#D4AF37" font-weight="300">ex</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="500" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="400" fill="#999999" text-anchor="middle" letter-spacing="1">
    CREATIVE STUDIO
  </text>
</svg>
