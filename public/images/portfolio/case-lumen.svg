<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <!-- DNA Helix Structure -->
    <path d="M150 50 Q 250 100 150 150 T 150 250 T 150 350 T 150 450" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.4" />
    <path d="M250 50 Q 150 100 250 150 T 250 250 T 250 350 T 250 450" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.4" />
    
    <!-- Base Pairs -->
    <line x1="150" y1="100" x2="250" y2="100" stroke="#c5a059" stroke-width="0.5" opacity="0.2" />
    <line x1="150" y1="200" x2="250" y2="200" stroke="#c5a059" stroke-width="0.5" opacity="0.2" />
    <line x1="150" y1="300" x2="250" y2="300" stroke="#c5a059" stroke-width="0.5" opacity="0.2" />
    <line x1="150" y1="400" x2="250" y2="400" stroke="#c5a059" stroke-width="0.5" opacity="0.2" />

    <!-- Medical Cross Nodes -->
    <rect x="195" y="145" width="10" height="10" fill="#c5a059" opacity="0.5" rx="1" />
    <rect x="198" y="140" width="4" height="20" fill="#c5a059" opacity="0.5" rx="1" />
    <rect x="190" y="148" width="20" height="4" fill="#c5a059" opacity="0.5" rx="1" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">LUMEN HEALTH</text>
</svg>
