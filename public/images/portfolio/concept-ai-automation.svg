<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <circle cx="200" cy="200" r="1" fill="#c5a059" opacity="0.8" />
    <path d="M100 150 Q200 50 300 150 T100 350 Q200 450 300 350" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.3" />
    <circle cx="150" cy="180" r="2" fill="#c5a059" />
    <circle cx="250" cy="220" r="2" fill="#c5a059" />
    <circle cx="200" cy="300" r="2" fill="#c5a059" />
    <line x1="150" y1="180" x2="250" y2="220" stroke="#c5a059" stroke-width="0.5" opacity="0.5" />
    <line x1="250" y1="220" x2="200" y2="300" stroke="#c5a059" stroke-width="0.5" opacity="0.5" />
    <line x1="200" y1="300" x2="150" y2="180" stroke="#c5a059" stroke-width="0.5" opacity="0.5" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">AI AUTOMATION</text>
</svg>
