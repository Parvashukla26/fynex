<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <!-- Abstract Financial Data Streams -->
    <path d="M50 400 Q150 380 200 250 T350 100" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.4" />
    <path d="M50 420 Q150 400 200 270 T350 120" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.2" />
    
    <!-- Candlestick Elements -->
    <line x1="120" y1="300" x2="120" y2="350" stroke="#c5a059" stroke-width="0.5" opacity="0.6" />
    <rect x="115" y="310" width="10" height="30" fill="#c5a059" opacity="0.3" />
    
    <line x1="180" y1="200" x2="180" y2="280" stroke="#c5a059" stroke-width="0.5" opacity="0.6" />
    <rect x="175" y="220" width="10" height="40" fill="#c5a059" opacity="0.3" />
    
    <line x1="280" y1="100" x2="280" y2="180" stroke="#c5a059" stroke-width="0.5" opacity="0.6" />
    <rect x="275" y="120" width="10" height="30" fill="#c5a059" opacity="0.3" />

    <!-- Nodes -->
    <circle cx="120" cy="325" r="1.5" fill="#c5a059" />
    <circle cx="180" cy="240" r="1.5" fill="#c5a059" />
    <circle cx="280" cy="135" r="1.5" fill="#c5a059" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">VANTAGE CAPITAL</text>
</svg>
