<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <!-- Architectural Lines -->
    <path d="M50 450 L 50 150 L 200 50 L 350 150 L 350 450" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.3" />
    <line x1="200" y1="50" x2="200" y2="450" stroke="#c5a059" stroke-width="0.5" opacity="0.2" />
    
    <!-- Floor Levels -->
    <line x1="50" y1="150" x2="350" y2="150" stroke="#c5a059" stroke-width="0.5" opacity="0.1" />
    <line x1="50" y1="250" x2="350" y2="250" stroke="#c5a059" stroke-width="0.5" opacity="0.1" />
    <line x1="50" y1="350" x2="350" y2="350" stroke="#c5a059" stroke-width="0.5" opacity="0.1" />

    <!-- 3D Perspective Box -->
    <path d="M150 200 L 250 200 L 250 350 L 150 350 Z" stroke="#c5a059" stroke-width="0.8" fill="none" opacity="0.5" />
    <path d="M150 200 L 200 170 L 300 170 L 250 200" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.3" />
    <path d="M250 200 L 300 170 L 300 320 L 250 350" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.3" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">KRONOS REAL ESTATE</text>
</svg>
