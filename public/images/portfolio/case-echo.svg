<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <!-- Cymatic Ripples -->
    <circle cx="200" cy="250" r="20" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.8" />
    <circle cx="200" cy="250" r="40" stroke="#c5a059" stroke-width="0.8" fill="none" opacity="0.6" />
    <circle cx="200" cy="250" r="60" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.4" />
    <circle cx="200" cy="250" r="80" stroke="#c5a059" stroke-width="0.3" fill="none" opacity="0.3" />
    <circle cx="200" cy="250" r="120" stroke="#c5a059" stroke-width="0.2" fill="none" opacity="0.2" />

    <!-- Waveform -->
    <path d="M50 250 Q 125 150, 200 250 T 350 250" stroke="#c5a059" stroke-width="1" fill="none" opacity="0.4" />
    <path d="M50 250 Q 125 350, 200 250 T 350 250" stroke="#c5a059" stroke-width="1" fill="none" opacity="0.4" />
    
    <!-- Center Point -->
    <circle cx="200" cy="250" r="3" fill="#c5a059" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">ECHO ACOUSTICS</text>
</svg>
