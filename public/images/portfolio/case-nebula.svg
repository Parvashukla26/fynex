<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <!-- Neural Network Grid -->
    <line x1="100" y1="100" x2="300" y2="400" stroke="#c5a059" stroke-width="0.2" opacity="0.2" />
    <line x1="300" y1="100" x2="100" y2="400" stroke="#c5a059" stroke-width="0.2" opacity="0.2" />
    <line x1="50" y1="250" x2="350" y2="250" stroke="#c5a059" stroke-width="0.2" opacity="0.2" />

    <!-- Central Hub -->
    <circle cx="200" cy="250" r="15" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.5" />
    <circle cx="200" cy="250" r="3" fill="#c5a059" />

    <!-- Satellite Nodes -->
    <circle cx="100" cy="100" r="2" fill="#c5a059" opacity="0.7" />
    <circle cx="300" cy="100" r="2" fill="#c5a059" opacity="0.7" />
    <circle cx="100" cy="400" r="2" fill="#c5a059" opacity="0.7" />
    <circle cx="300" cy="400" r="2" fill="#c5a059" opacity="0.7" />
    <circle cx="50" cy="250" r="2" fill="#c5a059" opacity="0.7" />
    <circle cx="350" cy="250" r="2" fill="#c5a059" opacity="0.7" />

    <!-- Connection Pulses -->
    <line x1="200" y1="250" x2="150" y2="175" stroke="#c5a059" stroke-width="0.5" opacity="0.4" />
    <line x1="200" y1="250" x2="250" y2="325" stroke="#c5a059" stroke-width="0.5" opacity="0.4" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">NEBULA SYSTEMS</text>
</svg>
