<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#grad1)" />
  <g filter="url(#glow)">
    <!-- Flowing Fabric Curves -->
    <path d="M0 100 C 100 0, 300 300, 400 200" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.3" />
    <path d="M0 120 C 120 20, 320 320, 400 220" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.2" />
    <path d="M0 250 C 150 150, 250 450, 400 350" stroke="#c5a059" stroke-width="0.8" fill="none" opacity="0.4" />
    
    <!-- Elegant Circle -->
    <circle cx="200" cy="250" r="50" stroke="#c5a059" stroke-width="0.5" fill="none" opacity="0.2" />
    <circle cx="200" cy="250" r="2" fill="#c5a059" />

    <!-- Particles -->
    <circle cx="100" cy="80" r="1" fill="#c5a059" opacity="0.6" />
    <circle cx="300" cy="380" r="1" fill="#c5a059" opacity="0.6" />
    <circle cx="250" cy="150" r="1" fill="#c5a059" opacity="0.6" />
  </g>
  <text x="50%" y="90%" text-anchor="middle" fill="#c5a059" font-family="serif" font-style="italic" font-size="12" opacity="0.5">AURA BOUTIQUE</text>
</svg>
